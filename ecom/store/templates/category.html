{% extends 'base.html' %}
{% load static %}
{% block content %}

<link rel="stylesheet" href="{% static 'css/category-summary.css' %}">

<!-- Hero -->
<header class="hero">
    <div class="hero-text">
        <h1>Categories</h1>
        <p>Explore our curated collections</p>
    </div>
</header>

<!-- Categories Grid -->
<section class="categories-section">
    <div class="categories-grid">

        {% for category in categories %}
        <a href="{% url 'category' category %}" class="category-card">
            <span>{{ category }}</span>
        </a>
        {% endfor %}

    </div>
</section>

{% endblock %}
