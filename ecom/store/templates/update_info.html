{% extends 'base.html' %}
{% load static %}
{% block content %}
<!-- Hero Section -->
 <link rel="stylesheet" href="{% static 'css/update_user_info.css' %}">


<!-- Form Section -->
<section class="form-section">
  <div class="form-container">
    <form method="POST" action="{% url 'update_info' %}">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" class="btn">Update Info</button>
    </form>
  </div>
</section>

{% endblock %}
